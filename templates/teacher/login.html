{% extends 'base.html' %}
{% block title %}Teacher Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <span class="auth-icon">🎓</span>
      <h1>Teacher Portal</h1>
      <p>Login with your name and register number</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Sign in to manage students & results</p>
      <form method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Enter your name" required/>
        </div>
        <div class="form-group">
          <label>Register Number</label>
          <input type="text" name="register_number" placeholder="e.g. TCH001" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login →</button>
      </form>
      <p class="auth-link">New teacher? <a href="{{ url_for('teacher_register') }}">Register here</a></p>
      <p class="auth-link"><a href="{{ url_for('index') }}">← Back to Home</a></p>
    </div>
  </div>
</div>
{% endblock %}
