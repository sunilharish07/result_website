{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-left student-left">
    <div class="auth-brand">
      <span class="auth-icon">📚</span>
      <h1>Student Portal</h1>
      <p>Login with your roll number and name</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h2>View Your Results</h2>
      <p class="auth-sub">Enter your details to see your grades</p>
      <form method="POST">
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" name="roll_number" placeholder="e.g. STU101" required/>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Enter your full name" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">View Results →</button>
      </form>
      <p class="auth-link"><a href="{{ url_for('index') }}">← Back to Home</a></p>
    </div>
  </div>
</div>
{% endblock %}
